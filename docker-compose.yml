services:
  qbittorrent-loadbalancer:
    image: qbittorrent-loadbalancer
    container_name: qbt-loadbalancer
    restart: unless-stopped
    ports:
      # Webhook端口映射
      - "50000:50000"
    volumes:
      # 配置文件挂载
      - ./config.json:/app/config.json:rw
      # 日志目录挂载
      - ./logs:/app/logs:rw
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3" 